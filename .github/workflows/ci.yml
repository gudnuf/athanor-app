name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  hermetic:
    name: hermetic tier (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: secret-scan (fail closed)
        run: |
          if git grep -nEi 'sk-ant-[A-Za-z0-9]|(anthropic|aws|openai|github|slack)[_-]?(api)?[_-]?(key|token|secret)[[:space:]]*[=:][[:space:]]*[^[:space:]]|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]+|-----BEGIN [A-Z ]*PRIVATE KEY-----' -- . ':!*.md' ':!.env.example'; then
            echo "secret-like content found"; exit 1; fi
      - name: fmt
        run: nix develop -c cargo fmt --all -- --check
      - name: clippy (hermetic features only)
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings
      - name: test (hermetic)
        run: nix develop -c cargo test --workspace
      - name: evals (hermetic)
        run: nix develop -c cargo test -p evals
