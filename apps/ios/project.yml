name: Athanor
# DEMO base spec — self-sufficient with zero setup: a clean checkout builds a
# placeholder SwiftUI shell from this file alone (no AthanorCoreFFI package
# dependency yet). Once athanor-core grows real domain logic (tria prima
# store, Goose embed, Mystagogue extension), this file gains a real-core
# variant following the murmur-rmp pattern: build-ffi.sh regenerates the
# xcframework + Swift bindings, generate.sh wires project-real.yml with the
# injected Anthropic key via a gitignored project.local.yml. Neither script
# exists yet — Phase 0 ships the shell scaffold only.
options:
  bundleIdPrefix: com.gudnuf
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Athanor:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Athanor
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Athanor listens to your Bellows so the Mystagogue can hear you tend your domains."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gudnuf.athanor
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1"
