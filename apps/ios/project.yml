name: Athanor
# DEMO base spec — self-sufficient with zero setup: a clean checkout builds a
# placeholder SwiftUI shell from this file alone (no AthanorCoreFFI package
# dependency yet). Once athanor-core grows real domain logic (tria prima
# store, Goose embed, Mystagogue extension), this file gains a real-core
# variant following the murmur-rmp pattern: build-ffi.sh regenerates the
# xcframework + Swift bindings, generate.sh wires project-real.yml with the
# injected Anthropic key via a gitignored project.local.yml. Neither script
# exists yet — Phase 0 ships the shell scaffold only.
options:
  bundleIdPrefix: com.gudnuf
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Athanor:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/App/Info.plist
      properties:
        # Literal build-variable reference — the real value is a build setting
        # supplied by the gitignored project.local.yml (see project-real.yml /
        # generate.sh) and expanded by xcodebuild into the built app's Info.plist.
        # This tracked value never holds a secret; in the demo build the setting
        # is undefined and expands to empty. RealEngineLoader reads it once at
        # first launch and copies it to the Keychain.
        ANTHROPIC_API_KEY: "$(ANTHROPIC_API_KEY)"
        # Dev-only lived-in seed fixture path (a build setting supplied by the
        # gitignored project.local.yml when generate.sh finds a local fixture;
        # empty otherwise). Read ONLY under `#if DEBUG` by RealEngineLoader to
        # seed a fresh install so every screen looks inhabited. Never a secret,
        # never committed with a value; release builds ignore it.
        ATHANOR_DEV_SEED_DB: "$(ATHANOR_DEV_SEED_DB)"
        # The committed "normy" demo persona's fixture path — baked when its
        # seed db exists, so `seed-profile=normy` at launch can select it over
        # the default. Same $(VAR) reference discipline; empty in a plain build.
        ATHANOR_DEV_SEED_DB_NORMY: "$(ATHANOR_DEV_SEED_DB_NORMY)"
        CFBundleDisplayName: Athanor
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Athanor listens to your Bellows so the Mystagogue can hear you tend your domains."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # App Store compliance: only exempt encryption (HTTPS/system TLS).
        # Without this, every uploaded build stalls on manual export compliance.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gudnuf.athanor
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
