# REAL-CORE spec: the demo base (project.yml) + the gitignored project.local.yml
# (which supplies the injected ANTHROPIC_API_KEY build setting), plus the
# AthanorCoreFFI package dependency that makes `#if canImport(AthanorCoreFFI)`
# true and activates the real athanor-core engine (RealEngineLoader).
#
# Generated by ./generate.sh (which first writes project.local.yml from .env).
# Do NOT run `xcodegen generate --spec project-real.yml` directly unless
# project.local.yml already exists — the include below requires it. For a
# zero-setup demo build, use bare `xcodegen generate` (project.yml) instead.
#
# xcodegen deep-merges includes with this file taking precedence, so the Athanor
# target keeps its type/sources/Info from project.yml and gains the dependency.
include:
  - path: project.yml
  - path: project.local.yml
name: Athanor
packages:
  AthanorCoreFFI:
    path: Packages/AthanorCoreFFI
targets:
  Athanor:
    dependencies:
      - package: AthanorCoreFFI
